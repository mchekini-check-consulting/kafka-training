server:
  port: 8182

payment:
  # Taux de succès simulé du paiement (0.0 à 1.0)
  success-rate: 0.85

spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:15432}/payments
    username: training
    password: training
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092,localhost:19094}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:18081}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      # payment.events a min.insync.replicas=2 : avec acks=all, si un broker
      # tombe, le producteur bloque (NotEnoughReplicasException) — démo du
      # compromis durabilité / disponibilité.
      acks: all
      properties:
        enable.idempotence: true
        value.subject.name.strategy: io.confluent.kafka.serializers.subject.TopicRecordNameStrategy
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      # Démo commit manuel : l'offset n'est commité qu'après ack explicite
      enable-auto-commit: false
      properties:
        specific.avro.reader: true
    listener:
      ack-mode: manual_immediate
      observation-enabled: true
    template:
      observation-enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics
