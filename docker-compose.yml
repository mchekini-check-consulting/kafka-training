services:

  # ----------------------------------------------------------------------
  # Contrôleur KRaft dédié (pas un broker) : avec seulement 2 brokers
  # combinés broker+controller, tuer un broker ferait perdre le quorum du
  # contrôleur. Un contrôleur séparé permet la démo "panne d'un broker".
  # ----------------------------------------------------------------------
  kafka-controller:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-controller
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 100
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "100@kafka-controller:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  kafka-1:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-1
    depends_on:
      - kafka-controller
    ports:
      - "19092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "100@kafka-controller:29093"
      # INTERNAL : communication entre containers, EXTERNAL : depuis la machine hôte
      # (ports hôte 19092/19094 : 9092 est déjà pris par un autre projet Docker)
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:29092,EXTERNAL://localhost:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      # Désactivé volontairement : les topics sont créés explicitement par kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-2:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-2
    depends_on:
      - kafka-controller
    ports:
      - "19094:9094"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "100@kafka-controller:29093"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:29092,EXTERNAL://localhost:19094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 10

  # ----------------------------------------------------------------------
  # Création explicite des topics avec leurs configs pédagogiques
  # ----------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic order.events     --partitions 6 --replication-factor 2 &&
      kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic inventory.events --partitions 6 --replication-factor 2 &&
      kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic payment.events   --partitions 6 --replication-factor 2 --config min.insync.replicas=2 &&
      kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic shipping.events  --partitions 3 --replication-factor 2 &&
      kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic notification.dlt --partitions 1 --replication-factor 2 &&
      echo '--- Topics créés : ---' &&
      kafka-topics --bootstrap-server kafka-1:29092 --list
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    ports:
      # 18081 côté hôte : 8081 est déjà pris par un autre projet Docker
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    ports:
      # 18080 côté hôte : 8080 est déjà pris sur la machine
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-training
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:29092,kafka-2:29092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      # 15432 côté hôte : 5432 est déjà pris par un autre projet Docker
      - "15432:5432"
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
      POSTGRES_DB: training
    volumes:
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U training
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------------
  # Services applicatifs — profil "apps" :
  #   docker compose up -d                  → infra seule
  #   docker compose --profile apps up -d   → infra + services
  # ----------------------------------------------------------------------
  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    container_name: order-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
      inventory-service:
        condition: service_started
    ports:
      - "8180:8180"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      INVENTORY_URL: "http://inventory-service:8181"

  inventory-service:
    build:
      context: .
      args:
        SERVICE: inventory-service
    container_name: inventory-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    ports:
      - "8181:8181"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

  payment-service:
    build:
      context: .
      args:
        SERVICE: payment-service
    container_name: payment-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    ports:
      - "8182:8182"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

  shipping-service:
    build:
      context: .
      args:
        SERVICE: shipping-service
    container_name: shipping-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    ports:
      - "8183:8183"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    container_name: notification-service
    profiles: ["apps"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    ports:
      - "8184:8184"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"

  analytics-service:
    build:
      context: .
      args:
        SERVICE: analytics-service
    container_name: analytics-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    ports:
      - "8185:8185"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"

volumes:
  postgres-data:
